[project]
name = "lithos-core"
version = "0.1.0"
description = "Lithos: typed IR, rule DB, and PDK metadata."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lithos_core"]
