[project]
name = "lithos-layout"
version = "0.1.0"
description = "Cells, primitives, synth, generator, and topology templates."
requires-python = ">=3.11"
dependencies = [
    "lithos-core",
    "gdsfactory>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lithos_layout"]
