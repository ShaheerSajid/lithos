# lithos cell topology template — 2-input NAND gate
#
# 2 NMOS in series (pull-down), 2 PMOS in parallel (pull-up).
#
# Placement (NMOS row):  N_A | N_B        (shared-diffusion abutment at net1)
# Placement (PMOS row):  P_A | P_B(MY)    (shared-diffusion abutment at Y)
#                         ↕ gate ↕ gate
#
# P_B is mirrored (MY) so P_A.D(Y) shares diffusion with P_B.D(Y).
# The shared Y at the P_A–P_B boundary routes down to N_B.D(Y).

name: cmos_nand2
description: >
  2-input CMOS NAND gate. 2 series NMOS (pull-down), 2 parallel PMOS (pull-up).

devices:
  N_A: {template: planar_mosfet, type: nmos, terminals: {G: A,   D: net1, S: GND}}
  N_B: {template: planar_mosfet, type: nmos, terminals: {G: B,   D: Y,    S: net1}}
  P_A: {template: planar_mosfet, type: pmos, terminals: {G: A,   D: Y,    S: VDD}}
  P_B: {template: planar_mosfet, type: pmos, terminals: {G: B,   D: Y,    S: VDD}}

nets:
  VDD:  {type: power, rail: top}
  GND:  {type: power, rail: bottom}
  A:    {type: signal}
  B:    {type: signal}
  Y:    {type: signal}
  net1: {type: internal}

# ── Placement: explicit per-device directives ──────────────────────────────

placement_logic:
  # ── NMOS row (left to right) ─────────────────────────────────────────────
  - name: N_A
    origin: [0, 0]

  - name: N_B
    relative_to: N_A
    relation: abut_x
    alignment: bottom

  # ── PMOS row (gate-aligned with NMOS) ────────────────────────────────────
  - name: P_A
    relative_to: N_A
    relation: align_gate
    alignment: gate

  - name: P_B
    relative_to: N_B
    relation: align_gate
    alignment: gate
    orientation: MY               # Y on left (shared with P_A.D=Y), VDD on right

ports:
  A:   {side: west,  terminal: N_A.G}
  B:   {side: west,  terminal: N_B.G}
  Y:   {side: east,  terminal: N_B.D}
  GND: {side: south, layer: m1}
  VDD: {side: north, layer: m1}
