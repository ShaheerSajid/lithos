# lithos cell topology template — 6T SRAM bit cell
#
# Cross-coupled CMOS inverter pair (INV_L, INV_R) with two NMOS access
# transistors (PG_L, PG_R) controlled by a common WL wordline.
#
# Placement (NMOS row):  PG_L | PD_L | PD_R | PG_R
# Placement (PMOS row):        PU_L | PU_R
#                              ↕ gate   ↕ gate
#
# Left inverter (PG_L, PD_L, PU_L) is mirrored (orientation: MY).
# Right inverter (PD_R, PU_R, PG_R) is normal (R0).
# Mirror axis at PD_L⟷PD_R boundary.
#
# Shared diffusion abutment:
#   PG_L⟷PD_L (net Q)    — pass-gate shares Q with pull-down
#   PD_L⟷PD_R (net GND)  — pull-downs share GND (power meets at mirror axis)
#   PD_R⟷PG_R (net Q_)   — pull-down shares Q_ with pass-gate
#   PU_L⟷PU_R (net VDD)  — pull-ups share VDD (power meets at mirror axis)
#
# Cell width fixed at 3.600 um for array tiling.
# Bitlines on m2 (full height), WL on m1 (full width).

name: sram_6t_bit_cell
description: >
  6-transistor SRAM bit cell.
  Cross-coupled CMOS inverter pair (INV_L, INV_R) with two NMOS access
  transistors (PG_L, PG_R) controlled by a common WL wordline.

cell_dimensions:
  width: 3.600     # array column pitch

abutment:
  pitch_x: 3.600
  mirror_x: true
  rail_align: true

devices:
  # Per-device w/l override global PARAMS.  Omit or set to 0 to use PARAMS.
  PD_L:   {template: planar_mosfet, type: nmos, terminals: {G: Q_,  D: Q,  S: GND}}
  PU_L:   {template: planar_mosfet, type: pmos, terminals: {G: Q_,  D: Q,  S: VDD}}
  PD_R:   {template: planar_mosfet, type: nmos, terminals: {G: Q,   D: Q_, S: GND}}
  PU_R:   {template: planar_mosfet, type: pmos, terminals: {G: Q,   D: Q_, S: VDD}}
  PG_L:   {template: planar_mosfet, type: nmos, terminals: {G: WL,  D: BL, S: Q }}
  PG_R:   {template: planar_mosfet, type: nmos, terminals: {G: WL,  D: BL_,S: Q_}}

nets:
  VDD:  {type: power, rail: top}
  GND:  {type: power, rail: bottom}
  Q:    {type: internal}
  Q_:   {type: internal}
  WL:   {type: signal}
  BL:   {type: signal}
  BL_:  {type: signal}

# ── Placement: explicit per-device directives ──────────────────────────────
#
# Each device says exactly where it goes relative to another device.
# The engine resolves spacing_rule values from the PDK automatically.
# No symbolic expressions — the YAML author names the intent, not the formula.

placement_logic:
  # ── NMOS row (left to right) ──────────────────────────────────────────
  #
  # Left inverter is mirrored (MY): internal nets face outward (toward
  # pass gates), power nets face centre.  Right inverter is normal (R0).
  # Mirror axis is the PD_L⟷PD_R abutment boundary.

  - name: PG_L                    # Pass-gate left: origin device
    origin: [0, 0]
    orientation: MY               # BL on left (outer), Q on right (shared with PD_L)

  - name: PD_L                    # Pull-down left: abuts PG_L (shared Q diffusion)
    relative_to: PG_L
    relation: abut_x
    alignment: bottom
    orientation: MY               # Q on left (shared with PG_L), GND on right (shared with PD_R)

  - name: PD_R                    # Pull-down right: abuts PD_L (shared GND diffusion)
    relative_to: PD_L
    relation: abut_x
    alignment: bottom             # R0 (default): GND on left (shared with PD_L), Q_ on right

  - name: PG_R                    # Pass-gate right: abuts PD_R (shared Q_ diffusion)
    relative_to: PD_R
    relation: abut_x
    alignment: bottom             # R0 (default): Q_ on left (shared with PD_R), BL_ on right

  # ── PMOS row (gate-aligned with NMOS) ─────────────────────────────────

  - name: PU_L                    # Pull-up left: gate aligns with PD_L
    relative_to: PD_L
    relation: align_gate
    alignment: gate
    orientation: MY               # Q on left, VDD on right (shared with PU_R)

  - name: PU_R                    # Pull-up right: gate aligns with PD_R
    relative_to: PD_R
    relation: align_gate
    alignment: gate               # R0 (default): VDD on left (shared with PU_L), Q_ on right

routing:
  WL:
    layer: m1
    path_type: trunk
    coverage: full_width
    port_side: [west, east]
    width_type: fixed_min
  BL:
    layer: m2
    coverage: full_height
    port_side: [north]
    width_type: fixed_min
  BL_:
    layer: m2
    coverage: full_height
    port_side: [north]
    width_type: fixed_min
  Q:    {strategy: local}
  Q_:   {strategy: local}

ports:
  WL:  {side: west,  layer: m1, terminal: PG_L.G}
  BL:  {side: north, layer: m2, terminal: PG_L.D}
  BL_: {side: north, layer: m2, terminal: PG_R.D}
  Q:   {side: west,  terminal: PD_L.D}
  Q_:  {side: east,  terminal: PD_R.D}
  GND: {side: south, layer: m1}
  VDD: {side: north, layer: m1}
