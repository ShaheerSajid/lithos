# lithos cell topology template — 2-input NOR gate
#
# 2 NMOS in parallel (pull-down), 2 PMOS in series (pull-up).
#
# Placement (NMOS row):  N_A | N_B(MX_sd)         (shared-diffusion abutment at Y)
# Placement (PMOS row):  P_A | P_B                (shared-diffusion abutment at net1)
#                         ↕ gate ↕ gate
#
# N_B is sd_flipped so N_A.D(Y) shares diffusion with N_B.D(Y).
# Y on the NMOS side comes out centred (the shared abutment node).
# Y on the PMOS side comes out on the right (P_B drain).

name: cmos_nor2
description: >
  2-input CMOS NOR gate. 2 parallel NMOS (pull-down), 2 series PMOS (pull-up).

devices:
  N_A: {template: planar_mosfet, type: nmos, terminals: {G: A,   D: Y,    S: GND}}
  N_B: {template: planar_mosfet, type: nmos, terminals: {G: B,   D: Y,    S: GND}}
  P_A: {template: planar_mosfet, type: pmos, terminals: {G: A,   D: net1, S: VDD}}
  P_B: {template: planar_mosfet, type: pmos, terminals: {G: B,   D: Y,    S: net1}}

nets:
  VDD:  {type: power, rail: top}
  GND:  {type: power, rail: bottom}
  A:    {type: signal}
  B:    {type: signal}
  Y:    {type: signal}
  net1: {type: internal}

# ── Placement ────────────────────────────────────────────────────────────────

placement_logic:
  # NMOS row: N_A then N_B with sd_flip so they share the Y diffusion.
  - name: N_A
    origin: [0, 0]

  - name: N_B
    relative_to: N_A
    relation: abut_x
    alignment: bottom
    sd_flip: true                 # Y on left (shared with N_A.D), GND on right

  # PMOS row, gate-aligned with NMOS.  Series chain: P_A then P_B share net1.
  - name: P_A
    relative_to: N_A
    relation: align_gate
    alignment: gate

  - name: P_B
    relative_to: N_B
    relation: align_gate
    alignment: gate

ports:
  A:   {side: west,  terminal: N_A.G}
  B:   {side: west,  terminal: N_B.G}
  Y:   {side: east,  terminal: P_B.D}
  GND: {side: south, layer: m1}
  VDD: {side: north, layer: m1}
