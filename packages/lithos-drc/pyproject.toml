[project]
name = "lithos-drc"
version = "0.1.0"
description = "Tool-agnostic DRC runner abstraction + KLayout/Magic backends."
requires-python = ">=3.11"
dependencies = [
    "lithos-core",
    "gdstk>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lithos_drc"]
