[project]
name = "lithos-repair"
version = "0.1.0"
description = "Heuristic DRC repair primitives and fix-graph engine."
requires-python = ">=3.11"
dependencies = [
    "lithos-core",
    "lithos-drc",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lithos_repair"]
