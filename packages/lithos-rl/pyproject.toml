[project]
name = "lithos-rl"
version = "0.1.0"
description = "RL env, policy, and training (BC / PPO / IBRL) for repair."
requires-python = ">=3.11"
dependencies = [
    "lithos-core",
    "lithos-drc",
    "lithos-layout",
    "lithos-repair",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lithos_rl"]
